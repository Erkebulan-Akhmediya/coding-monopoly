services:
  db:
    image: postgres:16
    container_name: monopoly-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monopoly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monopoly"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  pgdata:
